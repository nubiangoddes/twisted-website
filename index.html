<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twisted by NG Divine — Designed to Bend the Rules</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:wght@300;400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Montserrat',sans-serif;background:#FDF8F3;color:#1a1a1a;line-height:1.7;overflow-x:hidden;}

/* ── MARQUEE ── */
.marquee-strip{
  background:linear-gradient(90deg,#7B2FBE,#C8256E,#F57C00);
  padding:9px 0;overflow:hidden;white-space:nowrap;
}
.marquee-track{display:inline-block;animation:marquee 28s linear infinite;}
.marquee-track span{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:white;margin:0 24px;}
.m-dot{color:rgba(255,255,255,.5);}

/* ── HEADER ── */
header{
  background:#FDF8F3;position:sticky;top:0;z-index:1000;
  border-bottom:1px solid rgba(0,0,0,.06);
  padding:14px 5%;
}
.header-inner{
  display:flex;justify-content:space-between;align-items:center;
  max-width:1400px;margin:0 auto;
}
.nav-left{display:flex;gap:28px;}
.nav-left a{
  font-size:11px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;text-decoration:none;color:#333;transition:color .2s;
}
.nav-left a:hover{color:#E91E8C;}
.header-logo img{height:64px;display:block;}
.nav-right{display:flex;align-items:center;gap:20px;}
.nav-icon{font-size:17px;cursor:pointer;color:#333;position:relative;}
.cart-badge{
  position:absolute;top:-7px;right:-7px;
  background:#E91E8C;color:white;font-size:8px;font-weight:700;
  width:15px;height:15px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}

/* ── HERO ── */
.hero{
  position:relative;
  background:#FDF0E8;
  overflow:hidden;
}
.hero a{display:block;}
.hero-bg{
  width:100%;
  height:auto;
  display:block;
  max-height:90vh;
  object-fit:cover;
  object-position:center top;
}

.btn-hero{
  display:inline-flex;align-items:center;gap:10px;
  background:#1a1a1a;color:white;padding:15px 32px;
  font-size:12px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;text-decoration:none;
  border-radius:4px;transition:background .2s,transform .2s;
}
.btn-hero:hover{background:#333;transform:translateY(-2px);}

/* ── CANDY SHOP ── */
#collections{background:#FDF8F3;padding:60px 5%;}
.candy-header{text-align:center;margin-bottom:48px;}
.candy-header h2{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.8rem,3vw,2.6rem);font-weight:700;
  letter-spacing:2px;color:#1a1a1a;
}
.candy-sub{font-size:14px;color:#888;margin-top:8px;}
.candy-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:14px;max-width:780px;margin:0 auto;
}
.candy-card{
  border-radius:12px;overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,.08);
  transition:transform .3s,box-shadow .3s;
  background:white;
  display:block;
}
.candy-card:hover{transform:translateY(-4px);box-shadow:0 14px 36px rgba(0,0,0,.12);}
.candy-card img{
  width:100%;display:block;height:380px;object-fit:cover;object-position:center;
}
.candy-card-footer{
  padding:14px 16px 18px;text-align:center;
}
.candy-card.wined .candy-card-footer{background:#8B1A3A;}
.candy-card.twizzler .candy-card-footer{background:#4A1A7A;}
.candy-card.taffy .candy-card-footer{background:#D4790A;}
.candy-card-footer .shop-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 20px;background:white;border:none;
  border-radius:4px;font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  text-decoration:none;cursor:pointer;
  transition:opacity .2s,transform .2s;
}
.candy-card.wined .shop-btn{color:#8B1A3A;}
.candy-card.twizzler .shop-btn{color:#4A1A7A;}
.candy-card.taffy .shop-btn{color:#D4790A;}
.candy-card-footer .shop-btn:hover{opacity:.85;transform:translateY(-2px);}

.candy-tagline{
  text-align:center;margin-top:48px;
  font-size:15px;font-weight:600;color:#1a1a1a;
}
.candy-tagline em{
  font-family:'Dancing Script',cursive;
  font-size:20px;color:#E91E8C;font-style:normal;
}

/* ── CONFIDENCE ── */
.confidence{
  background:#FDF5EE;
  padding:0;
  text-align:center;
  position:relative;
}
.conf-section-img{
  width:100%;
  height:auto;
  display:block;
}
.conf-cta{
  padding:32px 0 56px;
  background:#FDF5EE;
}
.btn-dark{
  display:inline-block;background:#1a1a1a;color:white;
  padding:14px 32px;font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  text-decoration:none;border-radius:4px;
  transition:background .2s,transform .2s;
}
.btn-dark:hover{background:#333;transform:translateY(-2px);}

/* ── PILLARS ── */
.why-twisted{
  background:#FDF5EE;
  padding:0;
}
.why-img{
  width:100%;
  height:auto;
  display:block;
}

/* ── WILD ── */
.meet-natasha{
  background:#FDF5EE;
  padding:0;
}
.meet-img{
  width:100%;
  height:auto;
  display:block;
}
.wild-section{
  background:#FDF5EE;
  padding:0;
}
.wild-img{
  width:100%;
  height:auto;
  display:block;
}

/* ── SIGNUP ── */


/* ── FOOTER ── */
.bottom-section{
  position:relative;
  background:#0f0f0f;
}
.bottom-img{
  width:100%;
  height:auto;
  display:block;
}


/* ── ANIMATIONS ── */
@keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* ── MOBILE ── */
@media(max-width:768px){
  .header-inner{flex-wrap:wrap;gap:10px;}
  .nav-left{display:none;}
  .header-logo img{height:50px;}
  .hero-bg{max-height:none;}
  .hero-cta-strip{bottom:20px;left:4%;}
  .btn-hero{padding:12px 22px;font-size:11px;}
  #collections{padding:60px 4%;}
  .candy-grid{grid-template-columns:1fr;gap:16px;}
  .confidence{padding:0;}
  .conf-section-img{width:100%;height:auto;}
  .why-img{width:100%;height:auto;}
  .meet-img{width:100%;height:auto;}
  .email-overlay{position:relative;top:auto;right:auto;transform:none;width:100%;padding:20px;}
  .email-form{flex-direction:column;}
  .email-input{border-radius:4px;margin-bottom:8px;}
  .email-btn{border-radius:4px;}
}



footer{
  background:#1a1a1a;color:white;
  text-align:center;padding:48px 5% 28px;
}
.footer-sig{margin-bottom:24px;}
.footer-brand-name{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:700;
  background:linear-gradient(135deg,#7B2FBE,#E91E8C,#F57C00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:6px;
}
.footer-tagline{font-size:13px;color:#aaa;font-style:italic;margin-bottom:4px;}
.footer-founded{font-size:12px;color:#666;}
.footer-links{
  display:flex;justify-content:center;
  gap:24px;flex-wrap:wrap;margin-bottom:24px;
}
.footer-links a{
  color:#ccc;text-decoration:none;font-size:13px;
  font-weight:500;letter-spacing:1px;
  transition:color .2s;
}
.footer-links a:hover{color:#E91E8C;}
.footer-copy{font-size:11px;color:#555;font-style:italic;}


.bottom-section{position:relative;background:#0f0f0f;}
.bottom-img{width:100%;height:auto;display:block;}
.bold-cta{background:linear-gradient(135deg,#3a0060,#7B2FBE);padding:28px;text-align:center;}
.join-btn{
  display:inline-block;background:#F57C00;color:white;
  padding:16px 48px;font-family:'Montserrat',sans-serif;
  font-weight:700;font-size:14px;letter-spacing:2px;
  text-transform:uppercase;text-decoration:none;border-radius:4px;
  transition:background .2s,transform .2s;
}
.join-btn:hover{background:#e06600;transform:translateY(-2px);}

/* ── DUAL ANNOUNCE BAR ── */
.announce-bar{
  display:grid;grid-template-columns:1fr 1fr;
  background:linear-gradient(90deg,#7B2FBE,#E91E8C,#F57C00);
  min-height:36px;
}
.announce-left,.announce-right{
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:white;text-decoration:none;
  padding:8px 16px;transition:opacity .2s;
}
.announce-left{border-right:1px solid rgba(255,255,255,.2);}
.announce-left:hover,.announce-right:hover{opacity:.85;}

/* ── HEADER ── */
header{
  background:#FDF8F3;
  border-bottom:1px solid rgba(0,0,0,.06);
  position:sticky;top:0;z-index:1000;
}
.header-inner{
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;padding:12px 4%;
  max-width:1400px;margin:0 auto;
}
.nav-left{display:flex;align-items:center;gap:20px;}
.nav-left a{
  font-size:12px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;text-decoration:none;
  color:#333;transition:color .2s;white-space:nowrap;
}
.nav-left a:hover{color:#E91E8C;}
.hamburger{
  background:none;border:none;font-size:20px;
  cursor:pointer;color:#333;padding:4px;
  min-width:44px;min-height:44px;
  display:flex;align-items:center;justify-content:center;
}
.header-logo{text-align:center;}
.header-logo img{height:80px;display:block;margin:0 auto;}
.logo-sub{
  font-size:9px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;color:#888;margin-top:2px;
  text-align:center;
}
.header-logo a{text-decoration:none;}
.nav-right{
  display:flex;align-items:center;gap:8px;justify-content:flex-end;
}
.nav-icon-btn{
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;gap:4px;
  font-family:'Montserrat',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:#333;
  text-decoration:none;
  min-width:44px;min-height:44px;
  padding:8px;transition:color .2s;
}
.nav-icon-btn:hover{color:#E91E8C;}
.cart-wrap{position:relative;}
.cart-badge{
  position:absolute;top:2px;right:2px;
  background:#E91E8C;color:white;font-size:8px;font-weight:700;
  width:16px;height:16px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.nav-icon-label{font-size:11px;}

/* DROPDOWN */
.dropdown-wrap{position:relative;}
.dropdown-menu{
  display:none;position:absolute;top:100%;left:0;
  background:white;border:1px solid rgba(0,0,0,.08);
  border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.1);
  min-width:200px;z-index:200;padding:8px 0;
}
.dropdown-wrap:hover .dropdown-menu{display:block;}
.dropdown-menu a{
  display:block;padding:10px 20px;font-size:13px;
  color:#333;text-decoration:none;
  transition:background .2s,color .2s;
}
.dropdown-menu a:hover{background:#FDF8F3;color:#E91E8C;}

/* MOBILE MENU */
.mobile-menu{
  display:none;background:#FDF8F3;
  border-top:1px solid rgba(0,0,0,.06);
  padding:16px 5%;
}
.mobile-menu.open{display:block;}
.mobile-menu a{
  display:block;padding:12px 0;
  font-size:14px;font-weight:600;
  color:#333;text-decoration:none;
  border-bottom:1px solid rgba(0,0,0,.05);
  transition:color .2s;
}
.mobile-menu a:hover{color:#E91E8C;}

/* SEARCH BAR */
.search-bar{
  padding:12px 5%;background:white;
  border-top:1px solid rgba(0,0,0,.06);
  display:flex;gap:12px;align-items:center;
}
.search-input{
  flex:1;padding:10px 16px;border:1px solid rgba(0,0,0,.12);
  border-radius:4px;font-family:'Montserrat',sans-serif;
  font-size:14px;outline:none;
}
.search-input:focus{border-color:#E91E8C;}
.search-bar button{
  background:none;border:none;font-size:18px;
  cursor:pointer;color:#888;padding:4px;
}

/* MOBILE RESPONSIVE */
@media(max-width:900px){
  .nav-left a:not(.hamburger-parent){display:none;}
  .dropdown-wrap{display:none;}
  .nav-icon-label{display:none;}
  .header-logo img{height:60px;}
}

/* ── MASTER HERO WITH OVERLAYS ── */
.hero-master{width:100%;line-height:0;}
.hero-master-wrap{position:relative;display:block;width:100%;margin:0;}
.hero-master-img{width:100%;height:auto;display:block;}
.ovl{
  position:absolute;display:block;cursor:pointer;z-index:10;
  /* debug: background:rgba(255,0,255,.25);border:1px solid magenta; */
}

/* ── COLLECTIONS MASTER IMAGE ── */
#collections{padding:0;background:#FDF8F3;}
.collections-master{position:relative;display:block;width:100%;margin:0;line-height:0;}
.collections-img{width:100%;height:auto;display:block;}
.ovl-col{
  position:absolute;display:block;cursor:pointer;z-index:10;
  /* debug: background:rgba(0,255,0,.2);border:1px solid green; */
}

/* ── CONFIDENCE CARDS MASTER ── */
#confidence{padding:0;background:#FDF8F3;}
.conf-master{position:relative;display:block;width:100%;margin:0;line-height:0;}
.conf-img{width:100%;height:auto;display:block;}
.ovl-conf{
  position:absolute;display:block;cursor:pointer;z-index:10;
  /* debug: background:rgba(0,0,255,.2);border:1px solid blue; */
}

/* ── WHY TWISTED MASTER ── */
#why-twisted{padding:0;background:#FDF8F3;}
.why-master{position:relative;display:block;width:100%;margin:0;line-height:0;}
.why-img{width:100%;height:auto;display:block;}
.ovl-why{
  position:absolute;display:block;cursor:pointer;z-index:10;
  /* debug: background:rgba(255,165,0,.2);border:1px solid orange; */
}

/* ── TIGHTEN SECTION SPACING ── */
section{margin:0;padding:0;}
#collections,#confidence,#why-twisted,#why,.hero-master{margin:0;padding:0;}
.collections-img,.conf-img,.why-img,.hero-master-img{
  display:block;width:100%;margin:0;vertical-align:bottom;
}
.bottom-section{margin:0;padding:0;}
.bottom-img{display:block;width:100%;margin:0;vertical-align:bottom;}

/* ── MEET NATASHA MASTER ── */
#story{margin:0;padding:0;background:#FDF8F3;}
.natasha-master{position:relative;display:block;width:100%;margin:0;line-height:0;}
.natasha-img{display:block;width:100%;margin:0;vertical-align:bottom;}
.ovl-natasha{
  position:absolute;display:block;cursor:pointer;z-index:10;

}

/* ── ANNOUNCE BAR ── */
.announce-bar{display:grid;grid-template-columns:1fr 1fr;}
.announce-left{background:#7B2FBE;color:white;text-decoration:none;display:flex;align-items:center;justify-content:center;padding:10px 12px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;text-align:center;min-height:40px;transition:opacity .2s;}
.announce-right{background:#F57C00;color:white;text-decoration:none;display:flex;align-items:center;justify-content:center;padding:10px 12px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;text-align:center;min-height:40px;transition:opacity .2s;}
.announce-left:hover,.announce-right:hover{opacity:.85;}

/* ── HEADER ── */
header{background:#FDF8F3;border-bottom:1px solid rgba(0,0,0,.06);position:sticky;top:0;z-index:1000;}
.header-top{
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;padding:14px 5%;max-width:1400px;margin:0 auto;
}
.hdr-icon{
  font-size:26px;background:none;border:none;cursor:pointer;
  color:#333;text-decoration:none;
  min-width:48px;min-height:48px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s;
}
.hdr-icon:hover{transform:scale(1.1);}
.hamburger{justify-self:start;}
.header-logo{text-align:center;padding:4px 0;}

.cart-icon{position:relative;}

  display:flex;align-items:center;justify-content:center;
}

/* DESKTOP NAV */
.desktop-nav{
  display:flex;justify-content:center;gap:28px;
  padding:0 5% 12px;flex-wrap:wrap;
}
.desktop-nav a{
  font-size:12px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;text-decoration:none;color:#333;
  transition:color .2s;min-height:44px;display:flex;align-items:center;
}
.desktop-nav a:hover{color:#E91E8C;}

/* NAV PILLS (mobile) */
.nav-pills{
  display:none;
  justify-content:center;gap:8px;flex-wrap:wrap;

}
.pill{
  display:inline-flex;align-items:center;justify-content:center;

}
.pill:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.15);}
.pill-purple{background:#7B2FBE;}
.pill-pink{background:#E91E8C;}
.pill-orange{background:#F57C00;}

/* HAMBURGER MENU */

  display:none;position:fixed;top:0;left:0;
  width:100%;height:100%;background:rgba(0,0,0,.4);
  z-index:1999;
}
.menu-overlay.open{display:block;}
.mobile-menu{
  position:fixed;top:0;left:-320px;
  width:300px;max-width:85%;height:100%;

}

.menu-close{

}

  min-height:48px;
}
.menu-account a:hover{background:rgba(123,47,190,.06);color:#7B2FBE;}

/* HERO */
.hero-master{width:100%;line-height:0;margin:0;padding:0;}
.hero-master-wrap{position:relative;display:block;width:100%;margin:0;}
.hero-master-img{display:block;width:100%;margin:0;vertical-align:bottom;}
.ovl{position:absolute;display:block;cursor:pointer;z-index:10;}

/* ── RESPONSIVE ── */
/* Pills always visible */
.nav-pills{display:flex;}
/* Desktop: also show top nav */
@media(min-width:901px){
  .desktop-nav{display:flex;}
}
@media(max-width:900px){
  .desktop-nav{display:none;}
  .header-logo img{height:64px;}
  .hdr-icon{font-size:28px;}
}
@media(max-width:480px){
  .announce-left,.announce-right{font-size:9px;letter-spacing:.5px;padding:8px;}

}

/* ── NAV PILLS BAR (below hero) ── */

/* ── ANNOUNCE BAR ── */
.announce-bar{display:grid;grid-template-columns:1fr 1fr;}
.announce-left{background:#7B2FBE;color:white;text-decoration:none;display:flex;align-items:center;justify-content:center;padding:8px 12px;font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;min-height:36px;transition:opacity .2s;}
.announce-right{background:#F57C00;color:white;text-decoration:none;display:flex;align-items:center;justify-content:center;padding:8px 12px;font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;min-height:36px;transition:opacity .2s;}
.announce-left:hover,.announce-right:hover{opacity:.85;}

/* ── HEADER (minimal, premium) ── */
header{background:#FDF8F3;border-bottom:1px solid rgba(0,0,0,.06);position:sticky;top:0;z-index:1000;}
.header-top{

}
.hdr-icon{
  font-size:24px;background:none;border:none;cursor:pointer;
  color:#333;text-decoration:none;
  min-width:44px;min-height:44px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s;
}
.hdr-icon:hover{transform:scale(1.1);}
.hamburger{justify-self:start;}
.header-logo{text-align:center;}
.header-logo a{text-decoration:none;display:block;}
.header-logo img{

}
.header-icons{display:flex;align-items:center;gap:6px;justify-self:end;}
.cart-icon{position:relative;}
.cart-count{

}

}
.text-nav a{
